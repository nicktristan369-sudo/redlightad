name: Fix X/Twitter OAuth Provider

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'reset'
        type: choice
        options:
          - reset
          - enable
          - disable

jobs:
  fix-provider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Disable X/Twitter OAuth Provider
        if: github.event.inputs.action == 'reset' || github.event.inputs.action == 'disable'
        run: |
          echo "Disabling X/Twitter OAuth Provider..."
          curl -X PATCH \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_ID }}/config/auth/external/twitter" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"enabled": false}' \
            -w "\nHTTP Status: %{http_code}\n" -v
          
          sleep 3

      - name: Re-enable X/Twitter OAuth Provider
        if: github.event.inputs.action == 'reset' || github.event.inputs.action == 'enable'
        run: |
          echo "Re-enabling X/Twitter OAuth Provider..."
          curl -X PATCH \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_ID }}/config/auth/external/twitter" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true}' \
            -w "\nHTTP Status: %{http_code}\n" -v

      - name: Verify Provider Status
        run: |
          echo "Verifying X/Twitter OAuth Provider status..."
          curl -s -X GET \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_ID }}/config/auth/external/twitter" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" | \
            jq '.' || echo "Could not verify provider status"

      - name: Notify Success
        if: success()
        run: |
          echo "✅ X/Twitter OAuth Provider has been successfully reset!"
          echo "Login should now work at: https://redlightad.com/login"
          echo ""
          echo "If login still fails, try logging out and clearing browser cache, then try again."
