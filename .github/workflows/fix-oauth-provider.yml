name: Fix X/Twitter OAuth Provider

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'reset'
        type: choice
        options:
          - reset
          - enable
          - disable

jobs:
  fix-provider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Disable X/Twitter OAuth Provider
        if: github.event.inputs.action == 'reset' || github.event.inputs.action == 'disable'
        run: |
          echo "Disabling X/Twitter OAuth Provider..."
          curl -X PATCH \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_ID }}/auth/config" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "auth": {
                "external": {
                  "twitter": {
                    "enabled": false
                  }
                }
              }
            }' \
            -w "\nHTTP Status: %{http_code}\n"
          
          sleep 3

      - name: Re-enable X/Twitter OAuth Provider
        if: github.event.inputs.action == 'reset' || github.event.inputs.action == 'enable'
        run: |
          echo "Re-enabling X/Twitter OAuth Provider..."
          curl -X PATCH \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_ID }}/auth/config" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "auth": {
                "external": {
                  "twitter": {
                    "enabled": true
                  }
                }
              }
            }' \
            -w "\nHTTP Status: %{http_code}\n"

      - name: Verify Provider Status
        run: |
          echo "Verifying X/Twitter OAuth Provider status..."
          curl -s -X GET \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_ID }}/auth/config" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" | \
            jq '.auth.external.twitter // "Provider config not found"'

      - name: Notify Success
        if: success()
        run: |
          echo "✅ X/Twitter OAuth Provider has been successfully reset!"
          echo "Login should now work at: https://redlightad.com/login"
