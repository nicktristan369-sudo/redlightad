name: Fix X/Twitter OAuth Provider

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'reset'
        type: choice
        options:
          - reset
          - enable
          - disable

jobs:
  fix-provider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          npm install -g supabase

      - name: Disable X/Twitter OAuth Provider
        if: github.event.inputs.action == 'reset' || github.event.inputs.action == 'disable'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Disabling X/Twitter OAuth Provider..."
          supabase projects auth-update ${{ secrets.SUPABASE_PROJECT_ID }} \
            --twitter-enabled=false || true
          sleep 3

      - name: Re-enable X/Twitter OAuth Provider
        if: github.event.inputs.action == 'reset' || github.event.inputs.action == 'enable'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Re-enabling X/Twitter OAuth Provider..."
          supabase projects auth-update ${{ secrets.SUPABASE_PROJECT_ID }} \
            --twitter-enabled=true || true

      - name: Notify Success
        if: success()
        run: |
          echo "✅ X/Twitter OAuth Provider has been successfully processed!"
          echo "Login should now work at: https://redlightad.com/login"
          echo ""
          echo "If login still fails:"
          echo "  1. Clear your browser cache and cookies"
          echo "  2. Close all browser windows and reopen"
          echo "  3. Try logging in again"

      - name: Manual Fix Instructions
        if: failure()
        run: |
          echo "⚠️ Automated fix failed. Please manually:"
          echo ""
          echo "1. Go to: https://supabase.com/dashboard/project/${{ secrets.SUPABASE_PROJECT_ID }}/auth/providers"
          echo "2. Find 'X / Twitter (OAuth 2.0)'"
          echo "3. Click to disable it"
          echo "4. Wait 5 seconds"
          echo "5. Click to enable it again"
          echo "6. Test login at: https://redlightad.com/login"
